<div class="share-links">
  <span>Megosztás:</span>

  <!-- Facebook -->
  <a class="share fb"
     href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ include.page.url | default: page.url }}"
     target="_blank" rel="noopener">Facebook</a>

  <!-- X / Twitter -->
  <a class="share x"
     href="https://twitter.com/intent/tweet?url={{ site.url }}{{ include.page.url | default: page.url }}&text={{ include.page.title | default: page.title }}"
     target="_blank" rel="noopener">X</a>

  <!-- LinkedIn -->
  <a class="share li"
     href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ include.page.url | default: page.url }}"
     target="_blank" rel="noopener">LinkedIn</a>

  <!-- Reddit -->
  <a class="share rd"
     href="https://www.reddit.com/submit?url={{ site.url }}{{ include.page.url | default: page.url }}&title={{ include.page.title | default: page.title }}"
     target="_blank" rel="noopener">Reddit</a>

  <!-- Telegram -->
  <a class="share tg"
     href="https://t.me/share/url?url={{ site.url }}{{ include.page.url | default: page.url }}&text={{ include.page.title | default: page.title }}"
     target="_blank" rel="noopener">Telegram</a>

  <!-- WhatsApp -->
  <a class="share wa"
     href="https://api.whatsapp.com/send?text={{ include.page.title | default: page.title }}%20{{ site.url }}{{ include.page.url | default: page.url }}"
     target="_blank" rel="noopener">WhatsApp</a>

  <!-- VKontakte -->
  <a class="share vk"
     href="https://vk.com/share.php?url={{ site.url }}{{ include.page.url | default: page.url }}&title={{ include.page.title | default: page.title }}"
     target="_blank" rel="noopener">VK</a>
</div>
